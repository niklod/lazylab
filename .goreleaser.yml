version: 2
project_name: lazylab

before:
  hooks:
    - go mod tidy

builds:
  - id: lazylab
    main: ./cmd/lazylab
    binary: lazylab
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/niklod/lazylab/internal/version.version={{.Version}}
    targets:
      - linux_amd64
      - darwin_arm64
      - windows_amd64

archives:
  - id: lazylab
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Version }}-snapshot-{{ .ShortCommit }}"

changelog:
  sort: asc

release:
  draft: false
  prerelease: auto
